<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Archivio Segreto - Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            background: #2c1b0e url('background_cacatorio.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'MedievalSharp', cursive;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .book-container {
            background: rgba(0, 0, 0, 0.85);
            border: 4px double #ffcc00;
            border-radius: 15px;
            width: 95%;
            max-width: 800px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            margin-top: 20px;
        }

        h1 { font-family: 'Cinzel', serif; color: #ffcc00; text-align: center; }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-mode {
            background: #4a4a4a;
            color: white;
            border: 2px solid #ffcc00;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            transition: 0.3s;
        }

        .btn-mode.active { background: #ffcc00; color: black; }

        .breadcrumb {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .breadcrumb span { color: #ffcc00; cursor: pointer; text-decoration: underline; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid #ffcc00;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 5px;
        }

        .item-card:hover { background: rgba(255, 204, 0, 0.3); transform: scale(1.05); }

        .time-badge {
            background: #ffcc00;
            color: black;
            display: inline-block;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .back-home {
            margin-top: 40px;
            color: #ffcc00;
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>📜 L'ARCHIVIO DELLE GESTA 📜</h1>

    <div class="mode-selector">
        <button class="btn-mode active" onclick="setMode('ByDateFormat')">SFOGLIA PER DATA</button>
        <button class="btn-mode" onclick="setMode('ByShitterFormat')">SFOGLIA PER UTENTE</button>
    </div>

    <div class="book-container">
        <div id="breadcrumb" class="breadcrumb"></div>
        <div id="display-area" class="grid-container">
            </div>
    </div>

    <a href="index.html" class="back-home">⬅ Torna al Sacro Rotolo</a>

    <script>
        let fullData = {};
        let currentMode = 'ByDateFormat';
        let currentPath = [];

        // Carica il JSON
        fetch('shit_files/shitRegisterGlobal.json')
            .then(response => response.json())
            .then(data => {
                fullData = data;
                render();
            });

        function setMode(mode) {
            currentMode = mode;
            currentPath = [];
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.toggle('active'));
            render();
        }

        function render() {
            const area = document.getElementById('display-area');
            const bread = document.getElementById('breadcrumb');
            area.innerHTML = '';
            
            // Costruisci il percorso dei dati
            let dataLevel = fullData[currentMode];
            currentPath.forEach(key => {
                dataLevel = dataLevel[key];
            });

            // Render Breadcrumbs
            bread.innerHTML = `<span onclick="goToPath(-1)">Home</span> `;
            currentPath.forEach((step, index) => {
                bread.innerHTML += ` > <span onclick="goToPath(${index})">${step}</span>`;
            });

            // Se è un array (ovvero siamo arrivati alle ore)
            if (Array.isArray(dataLevel)) {
                area.style.display = 'block'; // Lista semplice per le ore
                dataLevel.forEach(ora => {
                    area.innerHTML += `<div class="time-badge">🕒 ${ora}</div>`;
                });
            } else {
                // Se è un oggetto (chiavi cliccabili)
                area.style.display = 'grid';
                Object.keys(dataLevel).forEach(key => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerText = key;
                    card.onclick = () => {
                        currentPath.push(key);
                        render();
                    };
                    area.appendChild(card);
                });
            }
        }

        function goToPath(index) {
            currentPath = currentPath.slice(0, index + 1);
            render();
        }
    </script>
</body>
</html>
