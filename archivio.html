<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Archivio Segreto - Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            background: #2c1b0e url('img/background_archive.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'MedievalSharp', cursive;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .book-container {
            background: rgba(0, 0, 0, 0.85);
            border: 4px double #ffcc00;
            border-radius: 15px;
            width: 95%;
            max-width: 800px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            margin-top: 20px;
        }

        h1 { font-family: 'Cinzel', serif; color: #ffcc00; text-align: center; }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-mode {
            background: #4a4a4a;
            color: white;
            border: 2px solid #ffcc00;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            transition: 0.3s;
        }

        .btn-mode.active { background: #ffcc00; color: black; }
        .btn-mode:hover { background: #ffcc00; color: black; }

        .header-actions {
            display: flex;
            justify-content: space-between; /* Spinge il percorso a sx e il tasto a dx */
            align-items: center;
            margin-bottom: 20px;
            min-height: 50px;
            gap: 10px;
            flex-wrap: wrap; /* Se non c'è spazio, il pulsante va sotto ma non si sovrappone */
        }

        .breadcrumb {
            color: #aaa;
            font-size: 0.9rem;
        }

        .breadcrumb span { color: #ffcc00; cursor: pointer; text-decoration: underline; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid #ffcc00;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 5px;
        }

        .item-card:hover { background: rgba(255, 204, 0, 0.3); transform: scale(1.05); }

        .time-badge {
            background: #ffcc00;
            color: black;
            display: inline-block;
            padding: 5px 10px;
            margin: 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .back-home {
            margin-top: 40px;
            color: #ffcc00;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Calculator Styles */
        .calc-form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .calc-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .medieval-input {
            background: #2c1b0e;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 8px;
            font-family: 'MedievalSharp', cursive;
            border-radius: 4px;
        }

        .parchment {
            background: #f4e4bc;
            color: #2c1b0e;
            padding: 40px;
            margin-top: 30px;
            border-radius: 5px;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #d2b48c;
            max-width: 500px;
            line-height: 1.6;
            background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 100%);
        }

        /* Burnt edge effect */
        .parchment::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 30px rgba(139, 69, 19, 0.3);
            pointer-events: none;
        }

        .parchment h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            border-bottom: 2px solid #2c1b0e;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>📜 L'ARCHIVIO DELLE GESTA 📜</h1>

    <div class="mode-selector">
        <button id="btn-date" class="btn-mode active" onclick="setMode('ByDateFormat')">SFOGLIA PER DATA</button>
        <button id="btn-shitter" class="btn-mode" onclick="setMode('ByShitterFormat')">SFOGLIA PER UTENTE</button>
    </div>

    <div class="book-container">
        <div class="header-actions">
            <div id="breadcrumb" class="breadcrumb"></div> <button id="btn-calculator" class="btn-mode" style="display: none; padding: 5px 15px;" onclick="openCalculator()">CALCOLATORE</button>
        </div>
        
        <div id="display-area" class="grid-container"></div>
        <div id="calculator-area" style="display: none;"></div>
    </div>

    <a onclick="location.reload()" class="back-home">⬅ Torna al Sacro Rotolo</a>

    <script>
        let fullData = {};
        let currentMode = 'ByDateFormat';
        let currentPath = [];

        // Load JSON
        fetch('shit_files/shitRegisterGlobal.json')
            .then(response => response.json())
            .then(data => {
                fullData = data;
                render();
            });

        function setMode(mode) {
            currentMode = mode;
            currentPath = [];
            document.getElementById('btn-date').classList.toggle('active', mode === 'ByDateFormat');
            document.getElementById('btn-shitter').classList.toggle('active', mode === 'ByShitterFormat');
            
            document.getElementById('display-area').style.display = 'grid';
            document.getElementById('calculator-area').style.display = 'none';
            render();
        }

        function render() {
            const area = document.getElementById('display-area');
            const bread = document.getElementById('breadcrumb');
            const calcBtn = document.getElementById('btn-calculator');
            area.innerHTML = '';
            
            calcBtn.style.display = (currentMode === 'ByShitterFormat') ? 'block' : 'none';

            let dataLevel = fullData[currentMode];
            currentPath.forEach(key => {
                dataLevel = dataLevel[key];
            });

            // Breadcrumbs
            bread.innerHTML = `<span onclick="goToPath(-1)">Home</span> `;
            currentPath.forEach((step, index) => {
                bread.innerHTML += ` > <span onclick="goToPath(${index})">${step}</span>`;
            });

            if (Array.isArray(dataLevel)) {
                area.style.display = 'block';
                dataLevel.forEach(ora => {
                    area.innerHTML += `<div class="time-badge">🕒 ${ora}</div>`;
                });
            } else {
                area.style.display = 'grid';
                Object.keys(dataLevel).forEach(key => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerText = key;
                    card.onclick = () => {
                        currentPath.push(key);
                        render();
                    };
                    area.appendChild(card);
                });
            }
        }

        function goToPath(index) {
            document.getElementById('display-area').style.display = 'grid';
            document.getElementById('calculator-area').style.display = 'none';
            currentPath = currentPath.slice(0, index + 1);
            render();
        }

        // --- Calculator Logic ---

        function openCalculator() {
            document.getElementById('display-area').style.display = 'none';
            const calcArea = document.getElementById('calculator-area');
            calcArea.style.display = 'block';

            const shitters = Object.keys(fullData.ByShitterFormat || {});
            const options = shitters.map(s => `<option value="${s}">${s}</option>`).join('');

            calcArea.innerHTML = `
                <div class="calc-form-container">
                    <div class="calc-inputs">
                        <select id="sel-shitter" class="medieval-input">${options}</select>
                        <input type="date" id="date-start" class="medieval-input">
                        <input type="date" id="date-end" class="medieval-input">
                        <button class="btn-mode" style="padding: 5px 15px;" onclick="calculateStats()">CALCOLA</button>
                    </div>
                    <div id="result-container"></div>
                </div>
            `;
        }

        function calculateStats() {
            const shitter = document.getElementById('sel-shitter').value;
            const startStr = document.getElementById('date-start').value;
            const endStr = document.getElementById('date-end').value;

            if (!startStr || !endStr) return alert("Scegli le date, nobile messere!");

            let start = new Date(startStr);
            let end = new Date(endStr);
            if (start > end) return alert("La data d'inizio non può essere futura rispetto alla fine!");

            let total = 0;
            let activeDays = 0;
            let totalDays = 0;

            let current = new Date(start);
            const data = fullData.ByShitterFormat[shitter];

            while (current <= end) {
                totalDays++;
                const year = current.getFullYear().toString();
                const monthName = current.toLocaleString('en-US', { month: 'long' });
                
                // Format DD/MM/YY
                const d = String(current.getDate()).padStart(2, '0');
                const m = String(current.getMonth() + 1).padStart(2, '0');
                const yShort = year.slice(-2);
                const dayKey = `${d}/${m}/${yShort}`;

                if (data?.[year]?.[monthName]?.[dayKey]) {
                    const count = data[year][monthName][dayKey].length;
                    if (count > 0) {
                        total += count;
                        activeDays++;
                    }
                }
                current.setDate(current.getDate() + 1);
            }

            const meanTheo = activeDays > 0 ? (total / activeDays).toFixed(2) : 0;
            const meanArith = totalDays > 0 ? (total / totalDays).toFixed(2) : 0;

            document.getElementById('result-container').innerHTML = `
                <div class="parchment">
                    <h2>Resoconto Gesta</h2>
                    <p><strong>Cacatore:</strong> ${shitter}</p>
                    <p><strong>Periodo:</strong> ${startStr} / ${endStr}</p>
                    <p><strong>Cacate Totali:</strong> ${total}</p>
                    <p><strong>Media Teorica:</strong> ${meanTheo}</p>
                    <p><strong>Media Aritmetica:</strong> ${meanArith}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
