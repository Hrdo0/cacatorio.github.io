<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c1b0e url('background_cacatorio.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem); 
            margin: 0;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-top: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        /* Layout Principale */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            width: 95%;
            max-width: 1400px;
            gap: 30px;
            margin-bottom: 50px;
        }

        /* Sidebar Laterali */
        .sidebar {
            flex: 1.2; 
            max-width: 280px; 
            background: rgba(0, 0, 0, 0.7);
            border: 4px double #ffcc00;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .sidebar img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #ffcc00;
            transition: transform 0.3s ease;
        }
        
        .sidebar img:hover {
            transform: scale(1.05);
        }

        .sidebar p {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #ffcc00;
            margin: 0;
        }

        /* Colonna Centrale */
        .content-center {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .audio-section {
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffcc00;
            text-align: center;
        }

        .audio-title {
            font-family: 'Cinzel', serif;
            color: #ffcc00;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px #000;
        }

        .pdf-container {
            width: 100%;
            height: 75vh;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,204,0,0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pulsante Mobile */
        .mobile-btn {
            display: none;
            margin-top: 10px;
            padding: 20px 40px;
            background: #fff4a3;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            box-shadow: 0 4px 15px rgba(255,204,0,0.4);
            text-align: center;
        }

        /* NUOVO: Bottone Community */
        .btn-community {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #4a4a4a; /* Grigio mattone */
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.75rem; /* Grandezza piccola */
            border: 1px solid #ffcc00;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .btn-community:hover {
            background-color: #333333;
            transform: scale(1.05);
        }

        /* --- LOGICA PER MOBILE --- */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .content-center {
                order: 1;
            }

            .sidebar:nth-of-type(1) {
                order: 2;
                margin-top: 20px;
            }

            .sidebar:last-of-type {
                order: 3;
                margin-top: 20px;
                margin-bottom: 80px; /* Spazio extra per non coprire il bottone community */
            }

            .pdf-container {
                display: none;
            }

            .mobile-btn {
                display: block;
                width: 80%;
                margin-bottom: 40px;
            }

            .sidebar {
                max-width: 90%;
                width: 90%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .sidebar img {
                width: 70%;
                max-width: 300px;
            }
            
            .sidebar p {
                font-size: 1.5rem;
            }

            .btn-community {
                width: 60%;
                text-align: center;
                right: 50%;
                transform: translateX(50%);
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BENVENUTO CACATORE</h1>
        <div class="subtitle">Consulta la sacra classifica 💩</div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <img src="immagine_sx.png" alt="Icona Sinistra">
            <p>Primo Cacatore™ Insignito 💩 </p>
        </aside>

        <div class="content-center">
            
            <div class="audio-section">
                <h3 class="audio-title">Ascolta gli ultimi aggiornamenti !</h3>
                <audio controls loop>
                    <source src="audio_cacatorio.mp3?v=1" type="audio/mpeg">
                    Il tuo browser non supporta l'audio.
                </audio>
            </div>

            <a href="pdf_cacatorio.pdf" target="_blank" class="mobile-btn">📜 CONSULTA IL SACRO ROTOLO 📜</a>

            <div class="pdf-container">
                <iframe src="pdf_cacatorio.pdf#toolbar=0&view=FitH" title="Classifica Cacatoria"></iframe>
            </div>

        </div>

        <aside class="sidebar">
            <img src="immagine_dx.png" alt="Icona Destra">
            <p> 🎄Vincitrice Christmas Edition 🎅</p>
        </aside>

    </div>

    <a href="LINK_AL_TUO_GOOGLE_FORM" target="_blank" class="btn-community">
        Vuoi unirti alla nostra community? Clicca qui !
    </a>

</body>
</html>
