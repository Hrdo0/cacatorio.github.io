<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Immagine di sfondo */
            background-image: url('background_cacatorio.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #2c1b0e; /* Colore di riserva se l'immagine non carica */
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a3728;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            /* Effetto pergamena semitrasparente per leggere bene il testo */
            background: rgba(245, 222, 179, 0.85); 
            border: 5px double #4a3728;
            margin: 30px 0;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 800px;
        }

        h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 4.5rem;
            margin: 0;
            color: #5d0000; /* Rosso scuro regale */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            font-weight: bold;
            font-style: italic;
        }

        /* Stile per il lettore audio */
        .audio-section {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 50px;
            border: 2px solid #4a3728;
        }

        /* Contenitore PDF */
        .pdf-container {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 8px solid #4a3728;
            border-radius: 5px;
            margin-bottom: 50px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile friendly */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>BENVENUTO CACATORE</h1>
        <div class="subtitle">Consulta la classifica cacatoria</div>
    </header>

    <div class="audio-section">
        <audio controls loop>
            <source src="audio_cacatorio.mp3" type="audio/mpeg">
            Il tuo browser non supporta l'audio.
        </audio>
    </div>

    <div class="pdf-container">
        <iframe src="pdf_cacatorio.pdf#toolbar=0" title="Classifica Cacatoria"></iframe>
    </div>

</body>
</html>
