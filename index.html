<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c1b0e url('background_cacatorio.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem); 
            margin: 0;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-top: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        /* Layout Principale */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            width: 95%;
            max-width: 1400px;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* Sidebar Laterali */
        .sidebar {
            flex: 1;
            max-width: 200px;
            background: rgba(0, 0, 0, 0.7);
            border: 4px double #ffcc00;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .sidebar img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #ffcc00;
        }

        .sidebar p {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #ffcc00;
            margin: 0;
        }

        /* Colonna Centrale */
        .content-center {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .audio-section {
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #ffcc00;
        }

        .pdf-container {
            width: 100%;
            height: 75vh;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,204,0,0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pulsante Mobile */
        .mobile-btn {
            display: none;
            margin-top: 20px;
            padding: 15px 25px;
            background: #ffcc00;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            box-shadow: 0 4px 15px rgba(255,204,0,0.4);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .sidebar {
                max-width: 80%;
                display: flex;
                align-items: center;
                gap: 20px;
                order: 2; /* Sposta le sidebar sotto il PDF */
            }

            .sidebar img {
                width: 80px;
                margin-bottom: 0;
            }

            .pdf-container {
                height: 50vh;
                order: 1;
            }

            .mobile-btn {
                display: inline-block;
                order: 1;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BENVENUTO CACATORE</h1>
        <div class="subtitle">Consulta la sacra classifica</div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <img src="immagine_sx.png" alt="Icona Sinistra">
            <p>First Best Shitter</p>
        </aside>

        <div class="content-center">
            
            <div class="audio-section">
                <audio controls loop>
                    <source src="audio_cacatorio.mp3" type="audio/mpeg">
                    Il tuo browser non supporta l'audio.
                </audio>
            </div>

            <a href="pdf_cacatorio.pdf" target="_blank" class="mobile-btn">APRI IL SACRO PDF</a>

            <div class="pdf-container">
                <iframe src="pdf_cacatorio.pdf#toolbar=0&view=FitH" title="Classifica Cacatoria"></iframe>
            </div>

        </div>

        <aside class="sidebar">
            <img src="immagine_dx.png" alt="Icona Destra">
            <p>Christmas Winner</p>
        </aside>

    </div>

</body>
</html>
