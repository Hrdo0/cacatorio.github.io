<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('background_cacatorie.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #2c1b0e;
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff; /* Testo generale bianco */
        }

        header {
            text-align: center;
            padding: 40px 20px;
            margin: 20px 0;
            width: 90%;
            max-width: 1000px;
            /* Riquadro giallino completamente rimosso */
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 6rem; /* Font notevolmente ingrandito */
            margin: 0;
            color: #ffcc00; /* Colore oro per risaltare */
            /* Questa ombra crea un contorno nero netto attorno al testo per renderlo leggibile su qualsiasi sfondo */
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 5px 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 2.5rem; /* Sottotitolo ingrandito */
            margin-top: 15px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .audio-section {
            margin-bottom: 40px;
            /* Sfondo semitrasparente scuro per far vedere bene i tasti del lettore audio */
            background: rgba(0, 0, 0, 0.6); 
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #ffcc00;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .pdf-container {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: transparent; /* Tolto lo sfondo bianco dal contenitore */
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); /* Ombra più marcata */
            border-radius: 8px;
            margin-bottom: 60px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Adattamento per i cellulari (per non far sbordare il testo gigante) */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            .subtitle { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>BENVENUTO CACATORE</h1>
        <div class="subtitle">Consulta la classifica cacatoria</div>
    </header>

    <div class="audio-section">
        <audio controls loop>
            <source src="audio_cacatorio.mp3" type="audio/mpeg">
            Il tuo browser non supporta l'audio.
        </audio>
    </div>

    <div class="pdf-container">
        <iframe src="pdf_cacatorio.pdf#toolbar=0" title="Classifica Cacatoria"></iframe>
    </div>

</body>
</html>
