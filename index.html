<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Cacatoria</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💩</text></svg>">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c1b0e url('img/background_cacatorio.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'MedievalSharp', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem); 
            margin: 0;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #000, 5px 5px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-top: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        /* Layout Principale */
        .main-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            width: 95%;
            max-width: 1400px;
            gap: 30px;
            margin-bottom: 50px;
        }

        /* Sidebar Laterali */
        .sidebar {
            flex: 1.2; 
            max-width: 280px; 
            background: rgba(0, 0, 0, 0.7);
            border: 4px double #ffcc00;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .sidebar img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #ffcc00;
            transition: transform 0.3s ease;
        }
        
        .sidebar img:hover {
            transform: scale(1.05);
        }

        .sidebar p {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #ffcc00;
            margin: 0;
        }

        /* Colonna Centrale */
        .content-center {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .audio-section {
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffcc00;
            text-align: center;
        }

        .audio-title {
            font-family: 'Cinzel', serif;
            color: #ffcc00;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px #000;
        }

        .pdf-container {
            width: 100%;
            height: 75vh;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,204,0,0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .archive-btn {
            display: block;
            margin: 10px auto 25px auto;
            padding: 15px 30px;
            background: #ffcc00;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border: 2px solid #000;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            box-shadow: 0 4px 15px rgba(255,204,0,0.4);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            width: fit-content;
        }

        .archive-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255,204,0,0.8);
        }

        /* Pulsante Mobile "Sacro Rotolo" */
        .mobile-btn {
            display: none;
            margin-top: 10px;
            padding: 20px 40px;
            background: rgba(255, 244, 163, 0.7);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border: 2px solid #000;
            font-family: 'Cinzel', serif;
            box-shadow: 0 4px 15px rgba(255,204,0,0.4);
            text-align: center;
        }

        /* Bottone Community FISSO */
        .btn-community {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #4a4a4a; /* Grigio mattone */
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'MedievalSharp', cursive;
            font-size: 0.85rem;
            border: 1px solid #ffcc00;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            z-index: 9999; /* Sempre sopra a tutto */
            transition: all 0.3s ease;
            display: block;
        }

        .btn-community:hover {
            background-color: #333333;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,1);
        }

        /* --- LOGICA PER MOBILE --- */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .content-center {
                order: 1;
            }

            .sidebar:nth-of-type(1) {
                order: 2;
                margin-top: 20px;
            }

            .sidebar:last-of-type {
                order: 3;
                margin-top: 20px;
                margin-bottom: 120px; /* Spazio per non coprire il testo finale */
            }

            .pdf-container {
                display: none;
            }

            .mobile-btn {
                display: block;
                width: 80%;
                margin-bottom: 40px;
            }

            .sidebar {
                max-width: 90%;
                width: 90%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .sidebar img {
                width: 70%;
                max-width: 300px;
            }
            
            .sidebar p {
                font-size: 1.5rem;
            }

            /* Bottone Community Mobile - Sempre visibile */
            .btn-community {
                bottom: 15px;
                right: 15px;
                font-size: 0.75rem;
                padding: 10px 14px;
                max-width: 160px; /* Per non farlo occupare tutto lo schermo */
                text-align: center;
                line-height: 1.2;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BENVENUTO CACATORE</h1>
        <div class="subtitle">Consulta la  classifica cacatoria 💩</div>
    </header>

    <div class="main-container">
        
        <aside class="sidebar">
            <img src="img/antonio.png" alt="Icona Sinistra">
            <p>Primo Cacatore™ Insignito 💩 </p>
        </aside>

        <div class="content-center">
            
            <div class="audio-section">
                <h3 class="audio-title">Ascolta gli ultimi aggiornamenti !</h3>
                <audio controls loop>
                    <source src="shit_files/audio_cacatorio.mp3" type="audio/mpeg">
                    Il tuo browser non supporta l'audio.
                </audio>
            </div>

            <a href="archivio.html" class="archive-btn">📜 APRI L'ARCHIVIO DELLE GESTA 📜</a>

            <a href="shit_files/pdf_cacatorio.pdf" target="_blank" class="mobile-btn">CONSULTA IL ROTOLO CACATORIO🧻</a>

            <div class="pdf-container">
                <iframe src="shit_files/pdf_cacatorio.pdf#toolbar=0" title="Classifica Cacatoria"></iframe>
            </div>

        </div>

        <aside class="sidebar">
            <img src="img/nadia.png" alt="Icona Destra">
            <p> 🎄Vincitrice Christmas Edition 🎅</p>
        </aside>

    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSf7RAC9hjnNFmZ8o4Ni7mXXm-uzP_ZXEx7IlxS0fvpEnPxSpg/viewform?usp=header" target="_blank" class="btn-community">
        Vuoi unirti alla nostra community? Clicca qui !🚽
    </a>

</body>
</html>
